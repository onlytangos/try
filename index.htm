#busqueda-clear{
  position: absolute;
  right: 4px;

  bottom: -8px;

#contenedor-botones {
  font-size:var(--fuenteG) !important;

  gap: 10px;                    /* espacio entre botones */
  margin-bottom: -10px;
}
/* ocultar checkbox real */
input.toggle {
  display: none !important;
}
/* botón moderno */
input.toggle + label {
  display: inline-flex !important;       /* fuerza display */
  justify-content: center;
  align-items: center;
  width: 70px !important;
  height: 24px;
  border-radius: 4px;
  background-color: #a9234f !important; /* inicial */
  color: var(--colorP);
  cursor: pointer;
  position: relative;
  transition: background-color .2s;
}
/* hover apagado */
input.toggle + label:hover {
  color: white;
  background-color: #df4b46 !important;
}
/* hover activado */
input.toggle:checked + label:hover {
   color: white; 
  background-color: #25a143 !important;
}
/* estado ON */
input.toggle:checked + label {
  background-color: #385735 !important; /* activado */
}
/* textos dentro del botón */
input.toggle + label span {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity .2s;
}
input.toggle + label .on {
  opacity: 0;
}
input.toggle:checked + label .on {
  opacity: 1;
}
input.toggle:checked + label .off {
  opacity: 0;
}

function getNt(valor,texto,tipo){
/*

obtener cuanto en videos cumplen en valor del option
cada selector es diferente

var colPosicion=6; posiciones figuras
var colGrupo=7; group 
var colUrl=8;

*/

let tr=[3,5,7,6,4]; // tema=columna en videos
let cnt=0; // contador
let w=0; // valor a buscar en videos

if (tipo==0){
  w=texto.split(' ')[0];
}else{
  w=texto;  
}

for (let j=0;j<videos.length;j++){
  if (tipo==0){
    let v=videos[j][tr[tipo]];
    if (w==v){cnt++}
  }else{
    let v=videos[j][tr[tipo]];
    if (v.includes(w)){cnt++}
  }


} 

return cnt;

}

function buscar(){
  var q = document.getElementById('busqueda').value.trim().toLowerCase();
  if (q === '') {
    // sin búsqueda: restaurar todos los selectores al estado normal
    for (var j = 0; j < 5; j++) {
      document.getElementById('S'+j).selectedIndex = 0;
    }
    cambio0();
    return;
  }
  // buscar en todos los campos usados por los selectores:
  // colAutor(3), colTema(5), colGrupo(7), colPosicion(6), colEstado(4)
  var txt = '';
  for (var j = 0; j < videos.length; j++) {
    var v = videos[j];
    // construir texto de búsqueda con los campos de los selectores
    // pareja: buscar nombre completo via parejasMapa
    var nombrePareja = (parejasMapa.get(v[colAutor]) || '') + ' ' + (v[colAutor] || '');
    var camposBusqueda = (
      nombrePareja + ' ' +
      (v[colTema]     || '') + ' ' +
      (v[colGrupo]    || '') + ' ' +
      (v[colPosicion] || '') + ' ' +
      (v[colEstado]   || '')
    ).toLowerCase();
    var palabras = q.split(/\s+/).filter(function(p){ return p.length > 0; });
    var coincide = palabras.every(function(p){ return camposBusqueda.indexOf(p) !== -1; });
    if (coincide) {
      txt += '<option value="'+(j+1)+'">'+v[colId]+' '+v[colTema]+' '+v[colPosicion]+'</option>';
    }
  }
  var ele = document.getElementById('S'+selVideo);
  ele.innerHTML = txt;
  // resetear selectores de filtro para no interferir
  for (var j = 0; j < 5; j++) {
    document.getElementById('S'+j).selectedIndex = 0;
  }
}

function madeSelectores(){
  var pel=document.getElementById('selectores');
  // caja de búsqueda encima del primer selector
  var elBusq = document.createElement('div');
  elBusq.id = 'busqueda-wrap';
  elBusq.className = 'selin';
  var inp = document.createElement('input');
  inp.type = 'text';
  inp.id = 'busqueda';
  inp.placeholder = 'search...';
  inp.setAttribute('autocomplete','off');
  inp.addEventListener('input', function(){
    document.getElementById('busqueda-clear').style.display = this.value ? 'block' : 'none';
    buscar();
  });
  var clr = document.createElement('span');
  clr.id = 'busqueda-clear';
  clr.innerHTML = '✕';
  clr.addEventListener('click', function(){
    document.getElementById('busqueda').value = '';
    this.style.display = 'none';
    for (var j = 0; j < 5; j++) document.getElementById('S'+j).selectedIndex = 0;
    cambio0();
  });
  elBusq.appendChild(inp);
  elBusq.appendChild(clr);
  pel.appendChild(elBusq);
  for (let j=0;j<nSel.length;j++){
    let el1=document.createElement('div');
    el1.className='selin';
    pel.appendChild(el1);
    if (j<5){
      let el2=document.createElement('label');
      el2.id='L'+j;
      el2.for='S'+j;
      el1.appendChild(el2);     
    }
    let el3=document.createElement('select');    
    el3.id='S'+j;
    el1.appendChild(el3);
  }
  document.getElementById('S'+selVideo).size=S5size;
}

          figuras.push(...limpias);

  }

}
